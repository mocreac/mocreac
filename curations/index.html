        <style>
            /* ────────── Design tokens (mirrors homepage) ────────── */
            :root {
                --sand-50:  #FAFAFA;
                --sand-100: #F5F5F5;
                --sand-200: #E6E6E6;
                --sand-300: #D3D3D3;
                --sand-400: #A3A3A3;
                --sand-500: #646464;
                --sand-600: #535353;
                --sand-700: #404040;
                --sand-800: #272727;
                --sand-900: #1A1A1A;
                --sand-950: #0B0B0B;
            }

            html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
            body {
                font-family: "Onest", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                letter-spacing: -0.02em;
            }
            .font-bold, .font-extrabold, .font-black { font-weight: 600 !important; }
            .tnum { font-variant-numeric: tabular-nums; }
            h1, h2, h3 { text-wrap: balance; }
            p { text-wrap: pretty; }

            /* ────────── Pills (mirrors homepage) ────────── */
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 10px 20px;
                border-radius: 999px;
                font-weight: 500;
                font-size: 14px;
                transition:
                    transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    background-color 220ms ease,
                    box-shadow 220ms ease;
            }
            .pill:hover { transform: translateY(-1px); }
            .pill-primary { background: #000; color: white; }
            .pill-primary:hover { background: var(--sand-900); box-shadow: 0 8px 20px -8px rgba(0,0,0,0.45); }
            .pill-secondary { background-color: var(--sand-200); color: rgb(17 24 39); }
            .pill-secondary:hover { background-color: var(--sand-300); }

            /* ────────── Layout ────────── */
            .shell {
                max-width: 960px;
                margin: 0 auto;
                padding: 8px 24px 80px 24px;
                width: 100%;
            }

            /* ────────── Category tabs ────────── */
            .tabs {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                margin: 4px 0 28px;
            }
            .tab {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: white;
                border: 1px solid var(--sand-300);
                color: var(--sand-700);
                border-radius: 999px;
                padding: 8px 14px;
                font-size: 13.5px;
                font-weight: 500;
                cursor: pointer;
                user-select: none;
                transition:
                    background-color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    border-color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 180ms cubic-bezier(0.16, 1, 0.3, 1);
                -webkit-tap-highlight-color: transparent;
                line-height: 1;
            }
            .tab:hover { border-color: var(--sand-500); color: var(--sand-900); }
            .tab:active { transform: scale(0.96); }
            .tab.is-active {
                background: var(--sand-900);
                border-color: var(--sand-900);
                color: white;
            }
            .tab.is-active .tab-count { color: var(--sand-400); }
            .tab-count {
                color: var(--sand-400);
                font-size: 12px;
                font-weight: 500;
            }

            /* ────────── Grid ────────── */
            .curations-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 16px;
            }
            @media (min-width: 640px) {
                .curations-grid { grid-template-columns: repeat(2, 1fr); }
            }

            /* ────────── Card ────────── */
            .curation-card {
                position: relative;
                background: white;
                border-radius: 22px;
                padding: 8px;
                display: flex;
                flex-direction: column;
                text-decoration: none;
                color: inherit;
                box-shadow:
                    0 0 0 1px rgba(11, 11, 11, 0.05),
                    0 1px 2px rgba(11, 11, 11, 0.03);
                transition:
                    transform 460ms cubic-bezier(0.16, 1, 0.3, 1),
                    box-shadow 460ms cubic-bezier(0.16, 1, 0.3, 1);
                will-change: transform;
            }
            @media (hover: hover) {
                .curation-card:hover {
                    transform: translateY(-6px);
                    box-shadow:
                        0 0 0 1px rgba(11, 11, 11, 0.06),
                        0 1px 2px rgba(11, 11, 11, 0.04),
                        0 24px 56px -20px rgba(11, 11, 11, 0.22);
                }
                .curation-card:hover .curation-banner img {
                    transform: scale(1.04);
                }
                .curation-card:hover .curation-arrow {
                    transform: translate(3px, -3px);
                    color: var(--sand-900);
                }
            }

            /* OG image banner. 1.91:1 matches the canonical OG aspect ratio
               (1200×630), so images render edge-to-edge without cropping.
               Sits inside the card's padding for a framed look. */
            .curation-banner {
                position: relative;
                width: 100%;
                aspect-ratio: 1.91 / 1;
                background-color: var(--sand-100);
                border-radius: 14px;
                overflow: hidden;
                box-shadow: inset 0 0 0 1px rgba(11, 11, 11, 0.04);
            }
            .curation-banner img {
                position: absolute;
                inset: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                display: block;
                transition: transform 620ms cubic-bezier(0.16, 1, 0.3, 1);
            }
            /* If the OG image fails to load, hide the broken image and
               leave the patterned placeholder background visible. */
            .curation-card.banner-failed .curation-banner img { display: none; }

            .curation-meta {
                padding: 14px 10px 8px;
                display: flex;
                align-items: flex-start;
                justify-content: space-between;
                gap: 12px;
            }
            .curation-text {
                display: flex;
                flex-direction: column;
                gap: 3px;
                min-width: 0;
            }
            .curation-title {
                font-size: 15px;
                font-weight: 600;
                color: var(--sand-900);
                line-height: 1.3;
            }
            .curation-source-label {
                font-size: 12.5px;
                color: var(--sand-500);
                font-weight: 500;
            }
            .curation-arrow {
                color: var(--sand-400);
                flex-shrink: 0;
                margin-top: 4px;
                transition:
                    transform 360ms cubic-bezier(0.16, 1, 0.3, 1),
                    color 220ms ease;
            }

            /* ────────── Empty state ────────── */
            .empty-state {
                display: none;
                text-align: center;
                padding: 64px 20px;
                color: var(--sand-500);
                font-size: 14px;
            }
            /* Focus visible polish */
            :focus-visible { outline: none; }
            .pill:focus-visible,
            .tab:focus-visible { box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.12); }

            /* ────────── Online status ────────── */
            .online-status {
                display: inline-flex;
                align-items: center;
                gap: 10px;
                font-size: 12px;
                font-weight: 500;
                color: var(--sand-500);
                line-height: 1;
                letter-spacing: -0.02em;
            }
            .online-status-dot {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: var(--sand-400);
                box-shadow: 0 0 0 3px rgba(163, 163, 163, 0.18);
                flex-shrink: 0;
                transition: background 240ms ease, box-shadow 240ms ease;
            }
            .online-status[data-status="online"] .online-status-dot {
                background: #22C55E;
                box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.22);
                animation: online-pulse 2.4s ease-in-out infinite;
            }
            @keyframes online-pulse {
                0%, 100% { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.22); }
                50%      { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.06); }
            }
            @media (prefers-reduced-motion: reduce) {
                .online-status-dot { animation: none !important; }
            }
        </style>
    </head>
    <body class="bg-[var(--sand-50)] text-gray-900 min-h-screen flex flex-col">
        <header class="py-6 flex items-center gap-4 max-w-[912px] w-full mx-auto">
            <a href="/" class="inline-flex shrink-0" aria-label="George Mocreac — Home">
                <img src="/logo.svg" alt="George Mocreac" class="shrink-0 w-[2.97rem] h-[2.97rem] sm:w-[3.7125rem] sm:h-[3.7125rem]" />

            <div>
                <p class="text-2xl sm:text-3xl font-semibold leading-[1.1] tracking-[-0.06em] text-[#858585]">George Mocreac</p>
                <h1 class="text-2xl sm:text-3xl font-semibold leading-[1.1] tracking-[-0.06em] text-[var(--sand-900)]">Curations</h1>
            </div>
        </header>
        <main class="flex-1 w-full">
            <div class="shell">
                <!-- Category tabs -->
                <div class="tabs" id="category-tabs" role="tablist" aria-label="Filter by category"></div>

                <!-- Grid -->
                <section>
                    <div class="curations-grid" id="curations-grid"></div>
                    <div class="empty-state" id="empty-state">
                        Nothing in this category yet — check back soon.
                    </div>
                </section>
            </div>
        </main>

        <footer class="py-6 mt-16 flex items-center text-xs text-[var(--sand-700)] max-w-[912px] w-full mx-auto">
            <div class="flex w-full items-center justify-between gap-3">
                <span class="tnum">© 2026 George Mocreac</span>
                <span class="online-status">
                    <span class="online-status-dot" aria-hidden="true"></span>
                    <span class="online-status-text">Checking…</span>
                </span>
            </div>
        </footer>

        <script type="module" src="/src/curations.ts"></script>
    </body>
</html>
