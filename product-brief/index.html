        <style>
            /* ────────── Design tokens (mirrors homepage) ────────── */
            :root {
                --sand-50:  #FAFAFA;
                --sand-100: #F5F5F5;
                --sand-200: #E6E6E6;
                --sand-300: #D3D3D3;
                --sand-400: #A3A3A3;
                --sand-500: #646464;
                --sand-600: #535353;
                --sand-700: #404040;
                --sand-800: #272727;
                --sand-900: #1A1A1A;
                --sand-950: #0B0B0B;
            }

            html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; scroll-behavior: smooth; }
            body {
                font-family: "Onest", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
                letter-spacing: -0.02em;
            }
            .font-bold, .font-extrabold, .font-black { font-weight: 600 !important; }
            .tnum { font-variant-numeric: tabular-nums; }
            h1, h2, h3 { text-wrap: balance; }
            p, label { text-wrap: pretty; }

            /* ────────── Pills (mirrors homepage) ────────── */
            .pill {
                display: inline-flex;
                align-items: center;
                padding: 10px 20px;
                border-radius: 999px;
                font-weight: 500;
                font-size: 14px;
                transition:
                    transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    background-color 220ms ease,
                    box-shadow 220ms ease,
                    color 220ms ease;
                cursor: pointer;
                border: none;
                user-select: none;
                -webkit-tap-highlight-color: transparent;
            }
            .pill:hover { transform: translateY(-1px); }
            .pill:active { transform: translateY(0) scale(0.96); }
            .pill-primary { background: #000; color: white; }
            .pill-primary:hover { background: var(--sand-900); box-shadow: 0 8px 20px -8px rgba(0,0,0,0.45); }
            .pill-primary:disabled { background: var(--sand-300); color: var(--sand-500); cursor: not-allowed; transform: none; box-shadow: none; }
            .pill-secondary { background-color: var(--sand-200); color: rgb(17 24 39); }
            .pill-secondary:hover { background-color: var(--sand-300); }
            .pill-ghost { background: transparent; color: var(--sand-600); }
            .pill-ghost:hover { background: var(--sand-100); color: var(--sand-900); }
            .pill-icon { padding: 10px; }
            .pill-icon svg { width: 18px; height: 18px; display: block; }

            /* ────────── Email popover (mirrors homepage) ────────── */
            .email-popover {
                position: relative;
                display: inline-flex;
            }
            .email-trigger {
                position: relative;
                cursor: pointer;
                border: 0;
                font-family: inherit;
            }
            .email-trigger::after {
                content: '';
                position: absolute;
                left: -12px;
                right: -12px;
                bottom: -14px;
                height: 14px;
            }
            .email-trigger:focus-visible {
                outline: 2px solid var(--sand-400);
                outline-offset: 3px;
            }
            .email-panel {
                position: absolute;
                top: calc(100% + 8px);
                right: 0;
                z-index: 50;
                min-width: 248px;
                padding: 6px;
                border-radius: 23px;
                background: #000;
                box-shadow:
                    0 1px 2px rgba(0, 0, 0, 0.35),
                    0 4px 12px rgba(0, 0, 0, 0.25),
                    0 24px 56px -16px rgba(0, 0, 0, 0.5),
                    inset 0 1px 0 rgba(255, 255, 255, 0.07);
                opacity: 0;
                transform-origin: top right;
                transform: translateY(-6px) scale(0.96);
                filter: blur(4px);
                pointer-events: none;
                transition:
                    opacity 220ms cubic-bezier(0.16, 1, 0.3, 1) 180ms,
                    transform 220ms cubic-bezier(0.16, 1, 0.3, 1) 180ms,
                    filter 220ms cubic-bezier(0.16, 1, 0.3, 1) 180ms;
                will-change: opacity, transform, filter;
            }
            .email-popover[data-state="open"] .email-panel,
            .email-popover:hover .email-panel {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
                pointer-events: auto;
                transition-delay: 0ms;
            }
            .email-option {
                position: relative;
                display: flex;
                align-items: center;
                gap: 10px;
                width: 100%;
                padding: 9px 14px;
                border: 0;
                border-radius: 999px;
                background: transparent;
                color: rgba(255, 255, 255, 0.92);
                font-family: inherit;
                font-size: 13.5px;
                font-weight: 500;
                line-height: 1.2;
                text-align: left;
                cursor: pointer;
                opacity: 0;
                transform: translateY(4px);
                filter: blur(2px);
                transition:
                    opacity 260ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 260ms cubic-bezier(0.16, 1, 0.3, 1),
                    filter 260ms cubic-bezier(0.16, 1, 0.3, 1),
                    background-color 180ms ease,
                    color 180ms ease;
            }
            .email-popover[data-state="open"] .email-option,
            .email-popover:hover .email-option {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
            .email-popover[data-state="open"] .email-option:nth-child(1),
            .email-popover:hover .email-option:nth-child(1) { transition-delay: 60ms, 60ms, 60ms, 0ms, 0ms; }
            .email-popover[data-state="open"] .email-option:nth-child(2),
            .email-popover:hover .email-option:nth-child(2) { transition-delay: 120ms, 120ms, 120ms, 0ms, 0ms; }
            .email-popover[data-state="open"] .email-option:nth-child(4),
            .email-popover:hover .email-option:nth-child(4) { transition-delay: 200ms, 200ms, 200ms, 0ms, 0ms; }
            .email-option:hover {
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
            }
            .email-option:focus-visible {
                outline: none;
                background: rgba(255, 255, 255, 0.08);
                box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, 0.22);
                color: #fff;
            }
            .email-popover[data-state="open"] .email-option:active,
            .email-popover:hover .email-option:active { transform: scale(0.96); }
            .email-option-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 16px;
                height: 16px;
                flex-shrink: 0;
                color: rgba(255, 255, 255, 0.9);
            }
            .email-option:hover .email-option-icon,
            .email-option:focus-visible .email-option-icon {
                color: #fff;
            }
            .email-option-icon-swap {
                position: relative;
                width: 14px;
                height: 14px;
            }
            .email-option-icon-swap svg {
                position: absolute;
                inset: 0;
                transition:
                    opacity 240ms cubic-bezier(0.2, 0, 0, 1),
                    transform 240ms cubic-bezier(0.2, 0, 0, 1),
                    filter 240ms cubic-bezier(0.2, 0, 0, 1);
            }
            .email-option-icon-copy { opacity: 1; transform: scale(1); filter: blur(0); }
            .email-option-icon-check {
                opacity: 0;
                transform: scale(0.25);
                filter: blur(4px);
                color: #22C55E;
            }
            .email-option-copy[data-copied="true"] .email-option-icon-copy {
                opacity: 0;
                transform: scale(0.25);
                filter: blur(4px);
            }
            .email-option-copy[data-copied="true"] .email-option-icon-check {
                opacity: 1;
                transform: scale(1);
                filter: blur(0);
            }
            .email-option-label {
                flex: 1;
                min-width: 0;
            }
            .email-option-copy .email-option-label {
                position: relative;
                display: inline-grid;
            }
            .email-option-copy .email-option-label-text,
            .email-option-copy .email-option-label-copied {
                grid-area: 1 / 1;
                transition:
                    opacity 240ms cubic-bezier(0.2, 0, 0, 1),
                    transform 240ms cubic-bezier(0.2, 0, 0, 1),
                    filter 240ms cubic-bezier(0.2, 0, 0, 1);
                font-variant-numeric: tabular-nums;
            }
            .email-option-copy .email-option-label-text {
                font-family: "Geist", ui-monospace, "SF Mono", Menlo, monospace;
                font-size: 12.5px;
                color: var(--sand-300);
                letter-spacing: -0.005em;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .email-option-copy:hover .email-option-label-text {
                color: #fff;
            }
            .email-option-copy .email-option-label-copied {
                color: #22C55E;
                opacity: 0;
                transform: translateY(4px);
                filter: blur(2px);
                pointer-events: none;
            }
            .email-option-copy[data-copied="true"] .email-option-label-text {
                opacity: 0;
                transform: translateY(-4px);
                filter: blur(2px);
            }
            .email-option-copy[data-copied="true"] .email-option-label-copied {
                opacity: 1;
                transform: translateY(0);
                filter: blur(0);
            }
            .email-option-arrow {
                flex-shrink: 0;
                color: rgba(255, 255, 255, 0.35);
                opacity: 0;
                transform: translate(-2px, 2px);
                transition:
                    opacity 200ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    transform 200ms cubic-bezier(0.2, 0.8, 0.2, 1),
                    color 200ms ease;
            }
            .email-option:hover .email-option-arrow,
            .email-option:focus-visible .email-option-arrow {
                opacity: 1;
                transform: translate(0, 0);
                color: rgba(255, 255, 255, 0.75);
            }
            .email-divider {
                height: 1px;
                margin: 4px 8px;
                background: rgba(255, 255, 255, 0.08);
            }
            @media (prefers-reduced-motion: reduce) {
                .email-panel,
                .email-option,
                .email-option-icon-swap svg,
                .email-option-arrow,
                .email-option-copy .email-option-label-text,
                .email-option-copy .email-option-label-copied {
                    transition-duration: 0.001ms !important;
                    animation-duration: 0.001ms !important;
                    animation-delay: 0ms !important;
                }
            }

            /* ────────── Progress indicator ────────── */
            .progress-track {
                display: grid;
                grid-template-columns: repeat(5, 1fr);
                gap: 6px;
                flex: 1;
                min-width: 60px;
                max-width: 480px;
            }
            .progress-seg {
                height: 3px;
                background: var(--sand-200);
                border-radius: 999px;
                overflow: hidden;
                position: relative;
            }
            .progress-seg::after {
                content: "";
                position: absolute;
                inset: 0;
                background: var(--sand-500);
                border-radius: 999px;
                transform: scaleX(0);
                transform-origin: left center;
                transition: transform 520ms cubic-bezier(0.16, 1, 0.3, 1);
            }
            .progress-seg.is-done::after,
            .progress-seg.is-current::after { transform: scaleX(1); }

            /* ────────── Step container ──────────
               Stack all steps in the same grid cell so the wrapper sizes to
               the tallest step. Page height stays constant across steps,
               which keeps the bottom nav pinned in the same visual position. */
            .steps-wrapper {
                flex: 1;
                display: grid;
                grid-template-columns: 1fr;
                align-content: center;
            }
            .step {
                grid-row: 1;
                grid-column: 1;
                visibility: hidden;
                opacity: 0;
                transform: translateY(8px);
                pointer-events: none;
                transition:
                    opacity 380ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 380ms cubic-bezier(0.16, 1, 0.3, 1),
                    visibility 0s linear 380ms;
                /* Section card — mirrors homepage .card */
                position: relative;
                background: var(--sand-200);
                border-radius: 40px;
                padding: 32px 28px;
                overflow: hidden;
                max-width: 960px;
                width: 100%;
                margin-left: auto;
                margin-right: auto;
            }
            @media (min-width: 960px) {
                .step {
                    width: 960px;
                    margin-left: -24px;
                    margin-right: -24px;
                }
            }
            .step::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image: var(--pattern-dots);
                background-repeat: repeat;
                pointer-events: none;
                z-index: 0;
                border-radius: inherit;
            }
            .step > * {
                position: relative;
                z-index: 1;
            }
            .step > *:last-child {
                margin-bottom: 0;
            }
            .step.is-active {
                visibility: visible;
                opacity: 1;
                transform: translateY(0);
                pointer-events: auto;
                transition:
                    opacity 380ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 380ms cubic-bezier(0.16, 1, 0.3, 1),
                    visibility 0s linear 0s;
            }
            .step.is-active > * {
                animation: field-in 480ms cubic-bezier(0.16, 1, 0.3, 1) both;
            }
            .step.is-active > *:nth-child(1) { animation-delay: 40ms; }
            .step.is-active > *:nth-child(2) { animation-delay: 110ms; }
            .step.is-active > *:nth-child(3) { animation-delay: 180ms; }
            .step.is-active > *:nth-child(4) { animation-delay: 250ms; }
            .step.is-active > *:nth-child(5) { animation-delay: 320ms; }
            .step.is-active > *:nth-child(6) { animation-delay: 390ms; }
            .step.is-active > *:nth-child(7) { animation-delay: 460ms; }
            .step.is-active > *:nth-child(8) { animation-delay: 530ms; }
            @keyframes field-in {
                from { opacity: 0; transform: translateY(10px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            /* ────────── Form fields ────────── */
            .field { margin-bottom: 24px; }
            .field-label {
                display: block;
                font-size: 17px;
                font-weight: 500;
                color: var(--sand-900);
                margin-bottom: 10px;
                line-height: 1.3;
            }
            .field-label .req {
                display: inline-block;
                width: 0.7em;
                height: 0.7em;
                margin-left: 0.3em;
                color: #FF2E01;
                vertical-align: baseline;
                line-height: 0;
            }
            .field-label .req svg {
                width: 100%;
                height: 100%;
                display: block;
                overflow: visible;
            }

            .input, .textarea {
                width: 100%;
                background: white;
                border: 1px solid transparent;
                border-radius: 12px;
                padding: 12px 14px;
                font-size: 15px;
                font-family: inherit;
                color: var(--sand-900);
                line-height: 1.5;
                letter-spacing: inherit;
                transition:
                    border-color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    box-shadow 180ms cubic-bezier(0.16, 1, 0.3, 1);
                resize: none;
                outline: none;
                -webkit-appearance: none;
            }
            .input::placeholder, .textarea::placeholder {
                color: var(--sand-400);
            }
            .input:focus, .textarea:focus {
                border-color: var(--sand-900);
            }
            /* Taller resting size + overflow:hidden so the auto-resize (in
               product-brief.ts) is the only thing that ever changes the height
               — no scrollbar flickers in while typing or behind a long placeholder. */
            .textarea { min-height: 120px; line-height: 1.55; overflow: hidden; }
            .field.has-error .input,
            .field.has-error .textarea,
            .field.has-error .option-card,
            .field.has-error .chip-grid {
                border-color: #C75A4A;
            }
            .field.has-error .field-label::after {
                content: " · required";
                color: #C75A4A;
                font-weight: 400;
                font-size: 13px;
            }

            /* ────────── Yes/No option cards ────────── */
            .option-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
            .option-card {
                position: relative;
                background-color: white;
                border: 1px solid transparent;
                border-radius: 14px;
                padding: 14px 16px;
                font-size: 15px;
                font-weight: 500;
                color: var(--sand-900);
                cursor: pointer;
                user-select: none;
                display: flex;
                align-items: center;
                transition:
                    background-color 320ms cubic-bezier(0.16, 1, 0.3, 1),
                    border-color 320ms cubic-bezier(0.16, 1, 0.3, 1),
                    box-shadow 320ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 220ms cubic-bezier(0.16, 1, 0.3, 1);
                -webkit-tap-highlight-color: transparent;
            }
            .option-card:active { transform: scale(0.985); }
            .option-card input { position: absolute; opacity: 0; pointer-events: none; }
            .option-card.is-selected,
            .field.has-error .option-card.is-selected {
                background-color: white;
                border-color: var(--sand-900);
                box-shadow:
                    0 1px 2px rgba(0,0,0,0.04),
                    0 12px 28px -10px rgba(0,0,0,0.18);
            }

            /* ────────── Associations chips ────────── */
            .chip-grid {
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                padding: 2px 0;
            }
            .chip {
                background: white;
                border: 1px solid var(--sand-300);
                color: var(--sand-700);
                border-radius: 999px;
                padding: 7px 13px;
                font-size: 13.5px;
                font-weight: 500;
                cursor: pointer;
                user-select: none;
                transition:
                    background-color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    border-color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    color 180ms cubic-bezier(0.16, 1, 0.3, 1),
                    transform 180ms cubic-bezier(0.16, 1, 0.3, 1);
                -webkit-tap-highlight-color: transparent;
                line-height: 1;
            }
            .chip:hover { border-color: var(--sand-500); color: var(--sand-900); }
            .chip:active { transform: scale(0.96); }
            .chip.is-selected {
                background: var(--sand-900);
                border-color: var(--sand-900);
                color: white;
            }
            /* ────────── Step navigation ────────── */
            .step-nav {
                position: sticky;
                bottom: 0;
                z-index: 5;
                padding: 14px 0 18px;
                background: transparent;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
            }
            .step-nav .pill {
                min-width: 132px;
                justify-content: center;
            }
            @media (max-width: 480px) {
                .step-nav { gap: 12px; }
                .step-nav .pill { min-width: 0; }
                .progress-track { min-width: 40px; }
            }

            /* ────────── Success ────────── */
            #success {
                flex: 1;
                flex-direction: column;
            }
            .success-wrapper {
                flex: 1;
                display: flex;
                flex-direction: column;
                padding: 24px 0;
            }
            @media (min-width: 960px) {
                .success-wrapper {
                    width: 960px;
                    margin-left: -24px;
                    margin-right: -24px;
                }
            }
            .success-card {
                flex: 1;
                padding: 32px 28px;
                text-align: center;
                animation: pop-in 480ms cubic-bezier(0.16, 1, 0.3, 1) both;
                /* Section card — mirrors homepage .card and .step */
                position: relative;
                background: var(--sand-200);
                border-radius: 40px;
                overflow: hidden;
                max-width: 912px;
                width: 100%;
                margin-left: auto;
                margin-right: auto;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            .success-card::before {
                content: '';
                position: absolute;
                inset: 0;
                background-image: var(--pattern-dots);
                background-repeat: repeat;
                pointer-events: none;
                z-index: 0;
                border-radius: inherit;
            }
            .success-card > * {
                position: relative;
                z-index: 1;
            }
            @keyframes pop-in {
                0% { transform: scale(0.98); opacity: 0; }
                100% { transform: scale(1); opacity: 1; }
            }

            /* ────────── Layout ────────── */
            /* Matches header/footer max-w-[912px] so the step-nav snaps to the
               same outer bounds as the navbar/footer. */
            .shell {
                max-width: 912px;
                margin: 0 auto;
                padding: 0;
                width: 100%;
                flex: 1;
                display: flex;
                flex-direction: column;
            }
            #brief-form {
                flex: 1;
                display: flex;
                flex-direction: column;

            .success-availability {
                margin-top: 22px;

                justify-content: center;
            }

                display: inline-flex;
                align-items: center;
                gap: 10px;
                font-size: 13px;
                font-weight: 500;
                color: var(--sand-600);
                line-height: 1;
                letter-spacing: -0.02em;
            }
            .online-status-dot {
                width: 8px;
                height: 8px;
                border-radius: 999px;
                background: var(--sand-400);
                box-shadow: 0 0 0 3px rgba(163, 163, 163, 0.18);
                flex-shrink: 0;
                transition: background 240ms ease, box-shadow 240ms ease;
            }
            .online-status[data-status="online"] .online-status-dot {
                background: #22C55E;
                box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.22);
                animation: online-pulse 2.4s ease-in-out infinite;
            }
            @keyframes online-pulse {
                0%, 100% { box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.22); }
                50%      { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0.06); }
            }
            @media (prefers-reduced-motion: reduce) {
                .online-status-dot { animation: none !important; }
            }

            /* ────────── Mobile (≤640px) ──────────
               Desktop layout is preserved untouched above this breakpoint.
               Below it: inset the edge-to-edge header / shell / footer, soften
               the step cards, and keep text inputs at 16px so iOS Safari does
               not zoom the viewport on focus. */
            @media (max-width: 640px) {
                /* Header frame: 24px, same on every page. The content island
                   (.shell → the step card) sits wider at 12px. */
                header { padding-left: 24px; padding-right: 24px; }
                .shell { padding-left: 12px; padding-right: 12px; }

                /* The sticky action bar is the page's footer on mobile; the ©
                   strip would only compete with it for the bottom edge. */
                footer { display: none; }

                .step { padding: 24px 20px; border-radius: 28px; }
                .success-card { padding: 28px 22px; border-radius: 28px; }

                .input, .textarea { font-size: 16px; }

                /* Card sizes to the ACTIVE step (others leave layout) and sits
                   at the top — no reserved tallest-step height, no floating
                   centered gap. The form scrolls to top on each step change. */
                .step:not(.is-active) { display: none; }
                .steps-wrapper { align-content: start; }

                /* Sticky white action bar, flush to the bottom of the screen.
                   The solid fill + top border keep the buttons off the form
                   content as it scrolls underneath; negative margins bleed it
                   past the shell padding to span full width; safe-area padding
                   clears the iOS home indicator. */
                .step-nav {
                    margin-left: -12px;
                    margin-right: -12px;
                    padding: 14px 24px max(16px, env(safe-area-inset-bottom));
                    background: #fff;
                    border-top: 1px solid var(--sand-200);
                    flex-wrap: wrap;
                    gap: 12px 16px;
                }
                /* Form nav: progress on its own row above Back + Continue. */
                .progress-track { order: -1; flex-basis: 100%; max-width: none; }
                /* Success nav: the two actions stacked full-width, reset removed. */
                #success .step-nav { flex-direction: column; align-items: stretch; }
                #success .step-nav .pill { width: 100%; justify-content: center; }
                #btn-reset { display: none; }

                /* Full-width buttons stack into a column, so the menu spans the
                   trigger's full width and drops straight beneath it. */
                .email-panel { left: 0; right: 0; min-width: 0; width: auto; max-width: none; }

                /* clip (not hidden) guards against horizontal scroll without
                   creating a scroll container that would break the sticky bar. */
                body { overflow-x: clip; }
            }
